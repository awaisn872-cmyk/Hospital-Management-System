<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Hospital Management System </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar card">
      <div class="logo">HMS</div>
      <div class="muted"> Hospital Management System</div>
      <nav class="nav" style="margin-top:14px">
        <button data-view="dashboard" class="active">Dashboard</button>
        <button data-view="patients">Patients</button>
        <button data-view="doctors">Doctors</button>
        <button data-view="appointments">Appointments</button>
        <button data-view="billing">Billing</button>
        <button data-view="settings">Settings</button>
      </nav>
    
    </aside>

    <main class="main">
      <div class="topbar">
        <h2 id="view-title">Dashboard</h2>
        <div class="search">
          <input id="globalSearch" placeholder="Search patients, doctors, appointments..." />
        </div>
      </div>

      <div id="view-container">
        <!-- dynamic content inserted here -->
      </div>

    </main>
  </div>

  <template id="tpl-dashboard">
    <div class="card">
      <h3>Quick Overview</h3>
      <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-top:12px">
        <div class="card" style="text-align:center">
          <div class="muted">Patients</div>
          <div id="stat-patients" style="font-size:22px; font-weight:700">0</div>
        </div>
        <div class="card" style="text-align:center">
          <div class="muted">Doctors</div>
          <div id="stat-doctors" style="font-size:22px; font-weight:700">0</div>
        </div>
        <div class="card" style="text-align:center">
          <div class="muted">Appointments</div>
          <div id="stat-appointments" style="font-size:22px; font-weight:700">0</div>
        </div>
        <div class="card" style="text-align:center">
          <div class="muted">Revenue (this session)</div>
          <div id="stat-revenue" style="font-size:22px; font-weight:700">0</div>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-patients">
    <div class="card">
      <h3>Patients</h3>
      <form id="patientForm" class="row" style="margin-top:10px">
        <input type="hidden" name="id" />
        <div>
          <label>Name</label>
          <input name="name" required />
        </div>
        <div>
          <label>Phone</label>
          <input name="phone" />
        </div>
        <div>
          <label>Age</label>
          <input name="age" type="number" />
        </div>
        <div>
          <label>Gender</label>
          <select name="gender"><option></option><option>Male</option><option>Female</option><option>Other</option></select>
        </div>
        <div style="grid-column:1/-1; display:flex; gap:8px; margin-top:8px">
          <button class="btn primary" type="submit">Save Patient</button>
          <button id="patientReset" class="btn ghost" type="button">Reset</button>
        </div>
      </form>

      <div class="list">
        <table id="patientsTable"><thead><tr><th>Name</th><th>Phone</th><th>Age</th><th>Gender</th><th>Actions</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </template>

  <template id="tpl-doctors">
    <div class="card">
      <h3>Doctors</h3>
      <form id="doctorForm" class="row" style="margin-top:10px">
        <input type="hidden" name="id" />
        <div>
          <label>Name</label>
          <input name="name" required />
        </div>
        <div>
          <label>Specialization</label>
          <input name="spec" />
        </div>
        <div>
          <label>Fee</label>
          <input name="fee" type="number" />
        </div>
        <div style="grid-column:1/-1; display:flex; gap:8px; margin-top:8px">
          <button class="btn primary" type="submit">Save Doctor</button>
          <button id="doctorReset" class="btn ghost" type="button">Reset</button>
        </div>
      </form>

      <div class="list">
        <table id="doctorsTable"><thead><tr><th>Name</th><th>Specialization</th><th>Fee</th><th>Actions</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </template>

  <template id="tpl-appointments">
    <div class="card">
      <h3>Appointments</h3>
      <form id="appointmentForm" class="row" style="margin-top:10px">
        <input type="hidden" name="id" />
        <div>
          <label>Patient</label>
          <select name="patientId" required></select>
        </div>
        <div>
          <label>Doctor</label>
          <select name="doctorId" required></select>
        </div>
        <div>
          <label>Date & Time</label>
          <input name="datetime" type="datetime-local" required />
        </div>
        <div style="grid-column:1/-1; display:flex; gap:8px; margin-top:8px">
          <button class="btn primary" type="submit">Book Appointment</button>
          <button id="appointmentReset" class="btn ghost" type="button">Reset</button>
        </div>
      </form>

      <div class="list">
        <table id="appointmentsTable"><thead><tr><th>When</th><th>Patient</th><th>Doctor</th><th>Fee</th><th>Actions</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </template>

  <template id="tpl-billing">
    <div class="card">
      <h3>Billing</h3>
      <div style="display:grid; grid-template-columns:1fr 320px; gap:12px">
        <div>
          <div class="muted">Select appointment to generate bill</div>
          <table id="billingAppointments"><thead><tr><th>When</th><th>Patient</th><th>Doctor</th><th>Actions</th></tr></thead><tbody></tbody></table>
        </div>
        <div class="card">
          <h4>Bill Preview</h4>
          <div id="billPreview" style="margin-top:8px; min-height:140px"></div>
          <div style="margin-top:10px; display:flex; gap:8px">
            <button id="printBill" class="btn primary">Print Bill</button>
            <button id="savePayment" class="btn ghost">Mark as Paid</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
